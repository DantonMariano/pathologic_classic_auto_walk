name: Build Windows .exe

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller pynput pywin32

      - name: Build .exe
        run: python build.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PathologicAutoWalk.exe
